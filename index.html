<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FLKO.INK</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header>
    <nav>
      <span class="logo">FLKO.INK</span>
      <ul>
        <li><a href="#trabajos">Trabajos</a></li>
        <li><a href="#sobre-mi">Sobre mí</a></li>
        <li><a href="#contacto">Contacto</a></li>
      </ul>
    </nav>
  </header>

  <section id="hero">
    <div class="hero-content">
      <h1>FLKO</h1>
      <p>Tatuador — Buenos Aires</p>
      <a href="#contacto" class="btn">Reservar turno</a>
    </div>
  </section>

  <section id="trabajos">
    <h2>Trabajos</h2>
    <div class="gallery">
      <!-- Reemplazar src con rutas reales a las imágenes -->
      <div class="gallery-item"><img src="images/trabajo-1.jpg" alt="Tatuaje 1"></div>
      <div class="gallery-item"><img src="images/trabajo-2.jpg" alt="Tatuaje 2"></div>
      <div class="gallery-item"><img src="images/trabajo-3.jpg" alt="Tatuaje 3"></div>
      <div class="gallery-item"><img src="images/trabajo-4.jpg" alt="Tatuaje 4"></div>
      <div class="gallery-item"><img src="images/trabajo-5.jpg" alt="Tatuaje 5"></div>
      <div class="gallery-item"><img src="images/trabajo-6.jpg" alt="Tatuaje 6"></div>
    </div>
  </section>

  <section id="sobre-mi">
    <div class="sobre-mi-content">
      <h2>Sobre mí</h2>
      <p>Breve descripción del tatuador, estilo de trabajo, años de experiencia y filosofía.</p>
    </div>
  </section>

  <section id="contacto">
    <h2>Contacto</h2>
    <div class="contacto-links">
      <a href="https://instagram.com/" target="_blank" rel="noopener">Instagram</a>
      <a href="mailto:contacto@flko.ink">contacto@flko.ink</a>
    </div>
  </section>

  <footer>
    <p>&copy; 2026 FLKO.INK</p>
  </footer>

</body>
</html>
